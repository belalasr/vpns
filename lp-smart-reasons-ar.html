<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>طريقة أذكى لاستخدام الإنترنت</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{
  background:#0b1220;
  color:#e5e7eb;
  font-family:Cairo,Arial,sans-serif;
  text-align:center;
  padding:60px 20px;
}
.box{max-width:760px;margin:auto;}
h1{font-size:32px;color:#38bdf8;margin-bottom:14px;}
.sub{font-size:18px;margin-bottom:30px;}
.reasons{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:16px;
  margin-bottom:34px;
}
.reason{
  background:#111827;
  padding:18px;
  border-radius:8px;
  font-size:15px;
}
.reason strong{display:block;margin-bottom:6px;color:#fff;}
a.cta{
  background:#22c55e;
  color:#000;
  padding:16px 46px;
  font-size:20px;
  font-weight:bold;
  border-radius:6px;
  text-decoration:none;
}
.note{margin-top:22px;font-size:13px;color:#9ca3af;}
@media(max-width:600px){
  .reasons{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div class="box">
<h1>طريقة أذكى للتصفح</h1>
<div class="sub">حل بسيط لتحسين الخصوصية والأمان أثناء استخدام الإنترنت</div>

<div class="reasons">
<div class="reason"><strong>حماية Wi-Fi</strong>تقليل المخاطر على الشبكات العامة</div>
<div class="reason"><strong>خصوصية أفضل</strong>تحكم أكبر أثناء التصفح</div>
<div class="reason"><strong>تصفح سلس</strong>تجربة يومية مريحة</div>
<div class="reason"><strong>سهل الاستخدام</strong>بدون إعدادات معقدة</div>
</div>

<a class="cta" href="https://cctlds.homes/click">
الانتقال إلى التحميل الرسمي
</a>

<div class="note">
لا وعود مضمونة • يختلف حسب الجهاز والمنطقة
</div>
</div>

</body>
</html>
